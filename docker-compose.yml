services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    volumes:
      - ./backend/data:/app/data
    ports:
      - "8000:8000"
  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://127.0.0.1:8000
